<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Панель покарань</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;

      background: url('https://images8.alphacoders.com/437/437718.jpg') center/cover no-repeat fixed;
    }

    .panel {
      background: rgba(0, 0, 0, 0.78);
      padding: 30px;
      border-radius: 15px;
      width: 360px;
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
      backdrop-filter: blur(3px);
    }

    h1 {
      text-align: center;
      font-family: 'Impact', sans-serif;
      font-size: 28px;
      margin-bottom: 25px;
      color: #fff;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.6),
        0 0 12px rgba(0, 0, 0, 0.9),
        2px 2px 0 #000;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #ccc;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
      background: #f5f5f5;
      color: #000;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, select:focus {
      background: #fff;
      box-shadow: 0 0 8px #00aaff;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(180deg, #f5f5f5, #bfbfbf);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(180deg, #ffffff, #d6d6d6);
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <div class="panel">
    <h1>Панель покарань</h1>

    <form id="punishForm">

      <label for="from">Від кого</label>
      <input name="from" id="from" placeholder="Хто видає покарання" required>

      <label for="user">Кому</label>
      <input name="user" id="user" placeholder="Кого покарати" required>

      <label for="reason">Причина</label>
      <input name="reason" id="reason" placeholder="Вкажіть причину" required>

      <label for="time">Час (необов'язково)</label>
      <input name="time" id="time" placeholder="Час покарання (необов'язково)">

      <!-- ТИП ПОКАРАННЯ -->
      <label for="punishType">Тип покарання</label>
      <select name="punishType" id="punishType">
        <option value="Попередження">Попередження</option>
        <option value="Виговор">Виговор</option>
        <option value="Догана">Догана</option>
        <option value="Строгий виговор">Строгий виговор</option>
        <option value="Відсторонення">Відсторонення</option>
        <option value="Вигнання">Вигнання</option>
      </select>

      <!-- ПОРАДА -->
      <label for="advice">Порада</label>
      <select name="advice" id="advice" onchange="toggleCustomAdvice()">
        <option value="Читати новини кожен день">1. Читати новини кожен день</option>
        <option value="Не пропускати лекції">2. Не пропускати лекції</option>
        <option value="Слухати старший склад">3. Слухати старший склад</option>
        <option value="Виконувати те, що сказали">4. Виконувати те, що сказали</option>
        <option value="Не прогулювати">5. Не прогулювати</option>
        <option value="custom">6. Своя порада</option>
      </select>

      <input 
        name="customAdvice" 
        id="customAdvice" 
        placeholder="Введіть свою пораду" 
        style="display:none; margin-top:10px;"
      >

      <button>Видати покарання</button>
    </form>
  </div>
