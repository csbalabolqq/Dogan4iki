<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Панель наказаний</title>
</head>
<body>

  <h1>Панель наказаний</h1>

  <form id="punishForm">
    <input name="user" placeholder="Кому" required><br>
    <input name="reason" placeholder="Причина" required><br>
    <input name="time" placeholder="Время (необязательно)"><br>

    <button>Выдать</button>
  </form>

  <script>
    document.getElementById("punishForm").onsubmit = async (e) => {
      e.preventDefault();

      const data = Object.fromEntries(new FormData(e.target));

      const res = await fetch("/api/punish", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user: data.user,
          reason: data.reason,
          time: data.time
        })
      });

      alert(res.ok ? "Отправлено!" : "Ошибка запроса");
    };
  </script>

</body>
</html>
