<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель наказаний</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">Discord moderation</p>
          <h1 data-i18n="title">Панель наказаний</h1>
        </div>
        <div class="toolbar-actions">
          <div class="field-group language-control">
            <label for="language" data-i18n="siteLanguage">Язык сайта</label>
            <select id="language" name="language">
              <option value="ru">Русский</option>
              <option value="uk">Українська</option>
            </select>
          </div>
          <div class="status-pill" id="status-pill">Готово</div>
        </div>
      </section>

      <section class="layout">
        <form class="panel form-panel" id="punishment-form">
          <input type="hidden" id="punishment-id" />

          <div class="field-group">
            <label for="type" data-i18n="typeLabel">Тип</label>
            <select id="type" name="type">
              <option value="Доган" data-type-option="Доган">Доган</option>
              <option value="Мут" data-type-option="Мут">Мут</option>
              <option value="Бан" data-type-option="Бан">Бан</option>
              <option value="Предупреждение" data-type-option="Предупреждение">Предупреждение</option>
            </select>
          </div>

          <div class="field-group">
            <label for="date" data-i18n="dateLabel">Когда</label>
            <input id="date" name="date" type="datetime-local" required />
          </div>

          <div class="form-grid">
            <div class="field-group">
              <label for="from" data-i18n="fromLabel">От кого</label>
              <input id="from" name="from" type="text" data-i18n-placeholder="fromPlaceholder" placeholder="Ник модератора" required />
            </div>

            <div class="field-group">
              <label for="to" data-i18n="toLabel">Кому</label>
              <input id="to" name="to" type="text" data-i18n-placeholder="toPlaceholder" placeholder="Ник игрока" required />
            </div>
          </div>

          <div class="field-group">
            <label for="reason" data-i18n="reasonLabel">Причина</label>
            <select id="reason" name="reason" required>
              <option value="Не явка на лекції" data-reason-option="Не явка на лекції">Не явка на лекції</option>
              <option value="Рекомендації голови колегії адвокатів і президента" data-reason-option="Рекомендації голови колегії адвокатів і президента">Рекомендації голови колегії адвокатів і президента</option>
              <option value="__custom__" data-i18n="customReasonOption">Своя причина</option>
            </select>
          </div>

          <div class="field-group custom-reason is-hidden" id="custom-reason-wrap">
            <label for="custom-reason" data-i18n="customReasonLabel">Своя причина</label>
            <textarea id="custom-reason" name="custom-reason" rows="4" data-i18n-placeholder="customReasonPlaceholder" placeholder="Напиши свою причину"></textarea>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit" id="submit-button" data-i18n="issueButton">Выдать</button>
            <button class="ghost-button" type="button" id="reset-button" data-i18n="clearButton">Очистить</button>
          </div>
        </form>

        <section class="panel list-panel">
          <div class="list-head">
            <div>
              <p class="eyebrow" data-i18n="journalEyebrow">Журнал</p>
              <h2 data-i18n="latestTitle">Последние записи</h2>
            </div>
            <input class="search-input" id="search" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="Поиск" />
          </div>

          <div class="cards" id="punishment-list"></div>
          <p class="empty-state" id="empty-state" data-i18n="emptyState">Пока записей нет.</p>
        </section>
      </section>
    </main>
  </body>
</html>
